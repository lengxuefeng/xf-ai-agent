[alembic]
script_location = alembic
prepend_sys_path = .

# 运行时会在 alembic/env.py 中用 app.db 的连接串覆盖
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/xf_ai_agent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
