<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式聊天测试 - XF AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: 400px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 12px;
        }
        .user-message {
            text-align: right;
        }
        .ai-message {
            text-align: left;
        }
        .typing-cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .thinking {
            color: #6B7280;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg">
        <!-- 标题栏 -->
        <div class="bg-blue-600 text-white p-4 rounded-t-lg">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fa fa-comments mr-2"></i>
                流式聊天测试
            </h1>
            <p class="text-blue-100 text-sm mt-1">测试XF AI Agent的流式输出和打字机效果</p>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container p-4" id="chatContainer">
            <div class="message ai-message">
                <div class="inline-block bg-gray-200 rounded-lg p-3 max-w-xs">
                    <p class="text-gray-800">你好！我是XF AI助手，请问有什么可以帮助你的吗？</p>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="border-t p-4">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="messageInput"
                    placeholder="请输入你的问题..."
                    class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500"
                    onkeypress="handleKeyPress(event)"
                >
                <button 
                    id="sendButton"
                    onclick="sendMessage()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors"
                    disabled
                >
                    <i class="fa fa-send"></i> 发送
                </button>
            </div>
            
            <!-- 快捷测试按钮 -->
            <div class="mt-3 flex flex-wrap gap-2">
                <button onclick="quickTest('杞县今天的天气怎么样？')" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition-colors">
                    天气查询
                </button>
                <button onclick="quickTest('你好')" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition-colors">
                    问候
                </button>
                <button onclick="quickTest('写一个Python的hello world')" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition-colors">
                    代码生成
                </button>
            </div>
        </div>

        <!-- 状态指示器 -->
        <div id="statusIndicator" class="hidden bg-yellow-100 border-t border-yellow-200 p-2">
            <p class="text-yellow-800 text-sm">
                <i class="fa fa-spinner fa-spin mr-2"></i>
                <span id="statusText">正在处理中...</span>
            </p>
        </div>
    </div>

    <script>
        let eventSource = null;
        let isStreaming = false;
        let currentResponse = '';
        let responseContainer = null;

        // 生成唯一会话ID
        const sessionId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('sendButton').disabled = false;
            document.getElementById('messageInput').focus();
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isStreaming) {
                sendMessage();
            }
        }

        function quickTest(message) {
            if (!isStreaming) {
                document.getElementById('messageInput').value = message;
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isStreaming) return;

            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 开始流式请求
            startStream(message);
        }

        function addMessage(content, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = type === 'user' 
                ? 'inline-block bg-blue-600 text-white rounded-lg p-3 max-w-xs ml-auto'
                : 'inline-block bg-gray-200 rounded-lg p-3 max-w-xs';
            
            const textP = document.createElement('p');
            textP.className = type === 'user' ? 'text-white' : 'text-gray-800';
            textP.textContent = content;
            
            bubbleDiv.appendChild(textP);
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return textP;
        }

        function startStream(message) {
            isStreaming = true;
            currentResponse = '';
            
            // 显示状态指示器
            showStatus('正在处理中...');
            
            // 禁用输入
            document.getElementById('sendButton').disabled = true;
            document.getElementById('messageInput').disabled = true;

            // 创建AI响应容器
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'inline-block bg-gray-200 rounded-lg p-3 max-w-xs';
            
            const textP = document.createElement('p');
            textP.className = 'text-gray-800';
            
            bubbleDiv.appendChild(textP);
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);
            
            responseContainer = textP;

            // 建立SSE连接
            eventSource = new EventSource('/api/v1/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    user_input: message,
                    session_id: sessionId
                })
            });

            // 实际上EventSource不支持POST，我们需要用fetch
            fetch('/api/v1/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    user_input: message,
                    session_id: sessionId
                })
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function readStream() {
                    return reader.read().then(({done, value}) => {
                        if (done) {
                            endStream();
                            return;
                        }

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    handleStreamEvent(data);
                                } catch (e) {
                                    console.error('解析SSE数据失败:', e, line);
                                }
                            }
                        }

                        return readStream();
                    });
                }

                return readStream();
            })
            .catch(error => {
                console.error('流式请求失败:', error);
                endStream();
                addMessage('抱歉，发生了错误：' + error.message, 'ai');
            });
        }

        function handleStreamEvent(data) {
            switch (data.type) {
                case 'thinking':
                    showStatus(data.content);
                    break;
                
                case 'response_start':
                    showStatus('正在生成回复...');
                    currentResponse = '';
                    if (responseContainer) {
                        responseContainer.textContent = '';
                    }
                    break;
                
                case 'stream':
                    // 逐字符添加到响应
                    currentResponse += data.content;
                    if (responseContainer) {
                        responseContainer.textContent = currentResponse;
                        // 滚动到底部
                        document.getElementById('chatContainer').scrollTop = 
                            document.getElementById('chatContainer').scrollHeight;
                    }
                    break;
                
                case 'response_end':
                    hideStatus();
                    break;
                
                case 'response':
                    // 兼容旧版本一次性返回
                    if (responseContainer) {
                        responseContainer.textContent = data.content;
                    }
                    hideStatus();
                    break;
                
                case 'error':
                    hideStatus();
                    if (responseContainer) {
                        responseContainer.textContent = '错误：' + data.content;
                        responseContainer.className += ' text-red-600';
                    }
                    break;
                
                case 'interrupt':
                    showStatus('等待用户确认...');
                    if (responseContainer) {
                        responseContainer.textContent = data.content;
                    }
                    break;
            }
        }

        function showStatus(message) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            statusText.textContent = message;
            indicator.classList.remove('hidden');
        }

        function hideStatus() {
            const indicator = document.getElementById('statusIndicator');
            indicator.classList.add('hidden');
        }

        function endStream() {
            isStreaming = false;
            
            // 启用输入
            document.getElementById('sendButton').disabled = false;
            document.getElementById('messageInput').disabled = false;
            
            // 隐藏状态指示器
            hideStatus();
            
            // 关闭连接
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            // 重置响应容器
            responseContainer = null;
            
            // 聚焦输入框
            document.getElementById('messageInput').focus();
        }
    </script>
</body>
</html>
