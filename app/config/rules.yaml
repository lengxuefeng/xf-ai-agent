# Rule Engine 外部配置文件
# 该文件用于配置系统初级规则引擎 (Rule_Engine_Node) 拦截处理的静态/高频意图。
# 匹配策略建议：优先匹配精确指令，使用负向查找(?!...)防止误拦截复合型复杂意图。

rules:
  # ==========================================
  # 【日期查询】
  # 意图：纯粹询问今天的日期/星期。
  # 优化：排除了包含“查、天气、新闻、历史、安排”等动作词的复合句，防止截胡 LLM 任务。
  # ==========================================
  - id: "query_date"
    intent: "QUERY_DATE"
    priority: 100
    patterns:
      - "^(?!.*(查|看|天气|新闻|历史|发生|安排|计划|总结)).*(今天几号|今天是几号|几号了|今天星期几|今天周几|今天礼拜几|今天的日期|今天是啥日子)[。？！?]*$"
    action: "call_tool://system/date"
    response_template: |
      今天是 {gregorian}，农历 {lunar}，{weekday}。
      需要我为您规划今天的日程或查询天气吗？

  # ==========================================
  # 【时间查询】
  # 意图：纯粹询问当前时间。
  # ==========================================
  - id: "query_time"
    intent: "QUERY_TIME"
    priority: 100
    patterns:
      - "^(?!.*(查|看|天气|新闻|提醒|定个)).*(现在几点|当前时间|现在的时间|现在是什么时间|几点了|时间是啥|现在啥时间|几点钟)[。？！?]*$"
      - "(?i)^(what time is it|what is the time|current time|time)[.?!]?$"
    action: "call_tool://system/time"
    response_template: "当前时间是 {time}。请合理安排您的时间哦。"

  # ==========================================
  # 【基础问候】
  # 意图：破冰与打招呼。
  # ==========================================
  - id: "greeting"
    intent: "GREETING"
    priority: 10
    patterns:
      - "^(你好|您好|嗨|嗨喽|hello|hi|hey)[呀啊呗]*[。？！?!]*$"
      - "^(早上好|早安|中午好|下午好|晚上好|晚安)[。？！?!]*$"
      - "^(在吗|有人吗|呼叫)[。？！?!]*$"
    action: "static_reply"
    response_template: "您好！我是您的专属 AI 助手。我能为您分析数据、编写代码、联网检索或处理复杂任务。请问今天能帮您做点什么？"

  # ==========================================
  # 【致谢与礼貌回应】(从问候中独立，体验更好)
  # ==========================================
  - id: "gratitude"
    intent: "GRATITUDE"
    priority: 10
    patterns:
      - "^(谢谢|多谢|感谢|辛苦了|太棒了|厉害)[呀啊呗]*[。？！?!]*$"
      - "^(拜拜|再见|回见|拜)[。？！?!]*$"
    action: "static_reply"
    response_template: "不客气！随时待命，有需要再叫我哦。👋"

  # ==========================================
  # 【身份查询】
  # ==========================================
  - id: "query_identity"
    intent: "IDENTITY"
    priority: 20
    patterns:
      - "^(你是谁|你叫什么|你的名字|介绍一下你自己)[。？！?!]*$"
      - "^(谁开发的你|你的开发者是谁|你的引擎是什么)[。？！?!]*$"
    action: "static_reply"
    response_template: "您好，我是基于先进 Agent 架构打造的复合型智能助手。我融合了 LLM 的深度推理与极速本地规则引擎，致力于为您提供既聪明又高效的服务！"

  # ==========================================
  # 【能力与帮助手册】
  # ==========================================
  - id: "query_capabilities"
    intent: "CAPABILITY"
    priority: 20
    patterns:
      - "^(你能做什么|你会做什么|支持什么功能|使用帮助|怎么用|help)[。？！?!]*$"
    action: "static_reply"
    response_template: |
      我是您的全能小助手，您可以这样使唤我：
      1. ⚡ **极速查询**：问我“今天几号”、“现在几点”，秒回您；
      2. 🔍 **联网检索**：帮您搜罗全网最新资讯和文献；
      3. 🛠️ **专业工具**：帮您查询数据库、执行代码、获取实时天气；
      4. 🧠 **复杂推理**：把长篇大论的需求发给我，我会自动拆解成子任务逐步完成！

  # ==========================================
  # 【系统健康与检查】
  # ==========================================
  - id: "query_system"
    intent: "SYSTEM_STATUS"
    priority: 90
    patterns:
      - "^(系统状态|当前版本|系统版本|健康检查)[。？！?!]*$"
      - "(?i)^ping$"
    action: "call_tool://system/version"
    response_template: "系统运行一切正常！✅\n- 核心版本：{version}\n- 编译时间：{compile_time}\n- 引擎状态：{engine_status}"

  # ==========================================
  # 【高频控制指令】(新增：工业级必备)
  # 意图：用于重置会话或停止当前输出，极速拦截
  # ==========================================
  - id: "control_clear"
    intent: "CLEAR_CONTEXT"
    priority: 100
    patterns:
      - "^(清空|重置|清除)(会话|上下文|记忆|聊天)[。？！?!]*$"
      - "^重新开始[。？！?!]*$"
    action: "call_tool://system/clear_context"
    response_template: "好的，我已经清空了刚才的记忆。我们开启一个全新的话题吧！✨"